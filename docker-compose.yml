version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: movie-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: moviedb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - movie-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: movie-redis
    ports:
      - "6379:6379"
    networks:
      - movie-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Service (Spring Boot)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: movie-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/moviedb?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: rootpassword
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    volumes:
      - ./storage:/app/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - movie-network
    restart: unless-stopped

  # AI Recommendation Service (Python FastAPI)
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: movie-ai-service
    ports:
      - "8001:8001"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: moviedb
      DB_USER: root
      DB_PASSWORD: rootpassword
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - movie-network
    restart: unless-stopped

  # Frontend (ReactJS)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: movie-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - movie-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  movie-network:
    driver: bridge
